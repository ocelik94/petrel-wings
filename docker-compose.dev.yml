# Petrel - Local Development Docker Compose
#
# No TLS, no Traefik. Plain HTTP on localhost.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   Panel: http://localhost:3000
#   Wings: http://localhost:8443

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: petrel
      POSTGRES_PASSWORD: petrel
      POSTGRES_DB: petrel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrel"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: petrel-wings/Dockerfile.migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../petrel-panel/drizzle:/app/drizzle:ro
    environment:
      DATABASE_URL: "postgresql://petrel:petrel@postgres:5432/petrel"
    command: node_modules/.bin/drizzle-kit migrate --config drizzle.config.ts

  panel:
    build:
      context: ../petrel-panel
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      ORIGIN: "http://localhost:3000"
      DATABASE_URL: "postgresql://petrel:petrel@postgres:5432/petrel"
      BETTER_AUTH_SECRET: "dev-secret-change-in-production"
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      ADMIN_EMAILS: ""

  wings:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - wings_data:/var/lib/petrel
      - ./wings-config.dev.yml:/etc/petrel/config.yml:ro

volumes:
  postgres_data:
  wings_data:
