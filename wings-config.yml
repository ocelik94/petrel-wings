# Wings configuration for production Docker Compose.
# TLS is handled by Traefik. Wings runs plain HTTP internally.

panel_url: "https://panel.example.com"
token: "change-me-to-a-secure-random-string"

api:
  host: "0.0.0.0"
  port: "8443"
  tls_cert: ""
  tls_key: ""

data_path: "/var/lib/petrel"

docker:
  socket: "/var/run/docker.sock"
  network: "petrel-wings_petrel"
